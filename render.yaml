services:
  - type: web
    name: puantaj-maas-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: ADMIN_USERNAME
        value: Ayf
      - key: ADMIN_PASSWORD_HASH
        value: 3bbe665633d6edfd61e91598560db3fee78a21da78b3fe77e9fefac5ecfc4cc1
      - key: REGISTER_INVITE_KEY_HASH
        value: 3825b97592ef25f0bb0fb784a3bfe0b016b1e27e134cff2379b69f85842cf52f
      - key: PG_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://puantaj-maas-backend.onrender.com,http://localhost:8081,http://localhost:19006
