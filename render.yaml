services:
  - type: web
    name: puantaj-maas-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d
      - key: ADMIN_USERNAME
        value: Yusuf
      - key: ADMIN_PASSWORD_HASH
        value: c3451b6107562d64e47292af94e8dd0ee16f8dc425b1c49d51196631e2292551
      - key: REGISTER_INVITE_KEY_HASH
        value: 0ac5c8a0408bb091b81da0f486a2a70b45b6bbe5924bd5f62facbac802503039
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: https://sevgilim-chat.onrender.com,http://localhost:8081,http://localhost:19006
